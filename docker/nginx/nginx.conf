user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65s;
    types_hash_max_size 10m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript+xml;
    gzip_proxied any;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api burst=10 nodelay=5;
    limit_conn_zone $binary_remote_addr zone=api burst=20 nodelay=10;

    server {
        listen 80;
        server_name ai-tide.com;
        root /usr/share/nginx/html;

        # Max upload size
        client_max_body_size 100m;

        # Timeouts
        client_body_timeout 300s;
        client_header_timeout 60s;
        keepalive_timeout 75s;

        # Frontend
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ = /index.html;

            # Cache static files
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # API proxy
        location /api/ {
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;

            # Rate limiting for API
            limit_req zone=api burst=20 nodelay=10;
        }
    }
}
}
