# AI-Tide Redis Configuration

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Timeout
timeout 300

# Clients
tcp-backlog 511
tcp-keepalive 300

# Security
requirepass ""
rename-command ""
