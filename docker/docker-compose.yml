services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ai-tide-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ai_tide_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_tide}
      MYSQL_USER: ${MYSQL_USER:-ai_tide_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ai_tide_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ai-tide-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai-tide-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - ai-tide-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ../ai-tide-api
      dockerfile: Dockerfile
    container_name: ai-tide-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-ai_tide}
      DB_USER: ${MYSQL_USER:-ai_tide_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-ai_tide_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-ai_tide_jwt_secret_change_this_in_production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7200000}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-tide-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Frontend Web
  web:
    build:
      context: ../ai-tide-web
      dockerfile: Dockerfile
    container_name: ai-tide-web
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - ai-tide-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ai-tide-nginx
    ports:
      - "3000:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - ai-tide-network

volumes:
  mysql-data:
  redis-data:

networks:
  ai-tide-network:
    driver: bridge
