server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: ai-tide-api
    profiles:
      active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ai_tide}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:ai_tide_user}
    password: ${DB_PASSWORD:ai_tide_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
      open-in-view: true
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        show_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          max-wait: -1ms
        shutdown-timeout: 200ms
  management:
    endpoints:
      web:
        base-path: /actuator
        exposure:
          include: health,info,metrics
    health:
      readiness-state:
        health-indicator:
          db:
            include: "db"
          redis:
            include: "redis"

logging:
  level:
    root: INFO
    com.ai.tide: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /app/logs/ai-tide-api.log
    max-size: 10MB
    max-history: 30

jwt:
  secret: ${JWT_SECRET:ai_tide_secret_key_change_in_production}
  expiration: ${JWT_EXPIRATION:7200000}

app:
  upload:
    path: /app/uploads
    avatar:
      max-size: 2097152
      allowed-types: image/jpeg,image/png
    cover:
      max-size: 5242880
      allowed-types: image/jpeg,image/png
    content:
      max-size: 10485760
      allowed-types: image/jpeg,image/png

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
