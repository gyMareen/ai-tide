server:
  port: 8080

spring:
  application:
    name: ai-tide-api
    profiles:
      active: dev
  datasource:
        url: jdbc:mysql://localhost:3306/ai_tide
        username: ai_tide_user
        password: ai_tide_password
        driver-class-name: com.mysql.cj.jdbc.Driver
      jpa:
        hibernate:
          ddl-auto: update
          open-in-view: true
          format_sql: true
          jdbc:
            time_zone: UTC
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQLDialectdia
          format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          max-wait: -1ms
          shutdown-timeout: 200ms

logging:
  level:
    root: INFO
    com.ai.tide: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

jwt:
  secret: ai_tide_dev_jwt_secret
  expiration: 7200000
